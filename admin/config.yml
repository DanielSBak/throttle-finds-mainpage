backend:
  name: git-gateway
  branch: main

site_domain: "rainbow-lokum-1f9076.netlify.app"

media_folder: "images/uploads" 
public_folder: "images/uploads"

collections:
  - name: "cars"
    label: "Inventory (Cars)"
    folder: "cars" 
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title (e.g. 2020 Dodge Challenger)", name: "title", widget: "string"}
      - {label: "Price", name: "price", widget: "string"}
      - {label: "VIN", name: "vin", widget: "string"}
      - {label: "Mileage", name: "mileage", widget: "string"}
      - {label: "Engine", name: "engine", widget: "string"}
      - {label: "Transmission", name: "transmission", widget: "string"}
      - {label: "Drive", name: "drive", widget: "string"}
      - {label: "Status (e.g. Clean Title)", name: "status", widget: "string"}
      - {label: "Main Image", name: "main_image", widget: "image"}
