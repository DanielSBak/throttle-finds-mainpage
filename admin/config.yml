backend:
  name: git-gateway
  branch: main

site_domain: "rainbow-lokum-1f9076.netlify.app"

media_folder: "images/uploads" 
public_folder: "images/uploads"

collections:
  - name: "cars"
    label: "Inventory (Cars)"
    folder: "cars" 
    create: true
    slug: "{{year}}-{{make}}-{{model}}"
    fields:
      # Основна інформація
      - {label: "Year", name: "year", widget: "number"}
      - {label: "Make (e.g. BMW, Ford)", name: "make", widget: "string"}
      - {label: "Model (e.g. X5, Mustang)", name: "model", widget: "string"}
      - {label: "Price ($)", name: "price", widget: "number"}
      
      # Технічні характеристики
      - {label: "VIN", name: "vin", widget: "string"}
      - {label: "Mileage", name: "mileage", widget: "number"}
      - {label: "Engine Details", name: "engine", widget: "string"}
      - {label: "Fuel Type", name: "fuel", widget: "select", options: ["Gasoline", "Diesel", "Hybrid", "Electric"]}
      - {label: "Transmission", name: "transmission", widget: "string"}
      - {label: "Drivetrain", name: "drive", widget: "select", options: ["AWD", "RWD", "FWD", "4x4"]}
      
      # Зовнішній вигляд та статус
      - {label: "Exterior Color", name: "exterior_color", widget: "string", required: false}
      - {label: "Interior Color", name: "interior_color", widget: "string", required: false}
      - {label: "Title Status", name: "title_status", widget: "select", options: ["Clean Title", "Rebuilt Title", "Salvage Title", "Bill of Sale"]}
      
      # Детальний опис (з можливістю виділяти текст жирним, робити списки тощо)
      - {label: "Detailed Description & Mechanic Notes", name: "body", widget: "markdown"}
      
      # Фотографії
      - {label: "Main Cover Image", name: "main_image", widget: "image"}
      - label: "Gallery Images (Add multiple photos)"
        name: "gallery"
        widget: "list"
        required: false
        field: {label: "Image", name: "image", widget: "image"}
